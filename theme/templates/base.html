<!DOCTYPE html>
<html lang="en">
<head>
	<!-- Basic Metas -->
	<meta charset="utf-8">
	<title>{% block title %}{% endblock %}</title>
	<meta name="description" content="{% block description %}{% endblock %}">
	<meta name="author" content="{{ SITE_AUTHOR }}">
	<link rel="author" href="{{ GOOGLE_PLUS_URL }}"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

	{% block meta %}{% endblock %}

	<!-- Stylesheets and Web Fonts -->
	{% assets filters="scss, cssmin", output="style.min.css", "theme.scss", "pygments.css" %}
	<link href="/{{ ASSET_URL }}" rel="stylesheet">
	{% endassets %}
	<link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">

	<!-- Favicons -->
	<!-- <link rel="apple-touch-icon" sizes="180x180" href="/{{ THEME_IMAGES_PATH }}/apple-touch-icon.png">
	<link rel="icon" type="image/png" href="/{{ THEME_IMAGES_PATH }}/favicon-16x16.png" sizes="16x16">
	<link rel="icon" type="image/png" href="/{{ THEME_IMAGES_PATH }}/favicon-32x32.png" sizes="32x32"> -->
</head>

<body>
	<div class="container">
		{% include "partial/sidebar.html" %}

		<article>
			{% block content %}{% endblock %}
			<hr>
		</article>

		<footer>
			<p>{{ FOOTER_TEXT }}</p>
		</footer>
	</div>

	{% if GOOGLE_ANALYTICS %}
	<!-- Google Analytics -->
	<script>
		(function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
		(i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
		m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
		})(window,document,'script','//www.google-analytics.com/analytics.js','ga');

		ga('create', '{{ GOOGLE_ANALYTICS }}', '{{ DOMAIN }}');
		ga('send', 'pageview');
	</script>
	{% endif %}
</body>
</html>
